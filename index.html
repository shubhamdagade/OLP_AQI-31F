<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Lodha Place | Air Quality Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-white: #FFFFFF;
            --divider: rgba(255, 255, 255, 0.35);
        }
        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; align-items: center;
           cursor: none;
            color: var(--text-white);
        }
 
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .bg-layer.active { opacity: 1; }
 
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 1000;
        }
        #warning-video { width: 100%; height: 100%; object-fit: cover; }
 
        .dashboard-container {
            position: relative;
            display: flex; width: 100%; height: 100%;
            padding: 0 6vw; box-sizing: border-box;
            align-items: center; justify-content: space-between;
        }
 
        .text-panel { flex: 0 0 55%; }
        .live-tag {
            font-size: 3vh;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            color: var(--text-white);
            margin-bottom: 4vh;
        }
        .headline {
            font-size: 6vh;
            font-weight: 400;
            color: var(--text-white);
            line-height: 1.1;
            margin: 0;
            letter-spacing: 0.05vw;
        }
        .status-word {
            display: block;
            font-weight: 600;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            margin-top: 0.3vh;
        }
 
        .cards-panel {
            flex: 0 0 28vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            padding: 2vh 0;
            text-align: center;
            box-sizing: border-box;
            width: 100%;
        }
        .location-label {
            font-size: 3vh;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15vw;
            color: var(--text-white);
            margin-bottom: 3vh;
        }
        .aqi-number {
            font-size: 13vh;
            font-weight: 200;
            color: var(--text-white);
            margin: 0;
            line-height: 1;
            letter-spacing: -0.4vh;
        }
        .metrics-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2.5vh;
        }
        .metric-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 2vw;
        }
        .m-label {
            font-size: 2.5vh;
            font-weight: 500;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            margin-bottom: 0.6vh;
        }
        .m-val {
            font-size: 3vh;
            font-weight: 500;
            color: var(--text-white);
        }
        .v-divider {
            width: 1px;
            background: var(--divider);
            height: 4.5vh;
        }
 
        .h-divider {
            width: 70%;
            height: 1px;
            background: var(--divider);
            margin: 2vh 0;
        }
        .cards-panel:has(#external-card.hidden) .h-divider { display: none; }
 
        .hidden { display: none !important; }
    </style>
</head>
<body id="main-ui">
 
    <div class="bg-layer active" id="bg-1" style="background-image: url('p1.jpg')"></div>
    <div class="bg-layer" id="bg-2" style="background-image: url('p2.jpg')"></div>
    <div class="bg-layer" id="bg-3" style="background-image: url('p3.jpg')"></div>
 
    <div id="video-overlay">
        <video id="warning-video" loop muted playsinline>
            <source src="OLPJanuary.mp4" type="video/mp4">
        </video>
    </div>
 
    <div class="dashboard-container" id="dashboard-wrapper">
        <div class="text-panel">
            <div class="live-tag">Live AQI</div>
            <h1 class="headline">Indoor air quality is<span class="status-word" id="status-text">Excellent</span></h1>
        </div>
        <div class="cards-panel">
            <div class="card" id="internal-card">
                <div class="location-label">One Lodha Place</div>
                <div class="aqi-number" id="in-aqi">--</div>
                <div class="metrics-grid">
                    <div class="metric-block">
                        <span class="m-label">PM 2.5</span>
                        <span class="m-val"><span id="in-pm25">--</span></span>
                    </div>
                    <div class="v-divider"></div>
                    <div class="metric-block">
                        <span class="m-label">PM 10</span>
                        <span class="m-val"><span id="in-pm10">--</span></span>
                    </div>
                </div>
            </div>
           <div class="h-divider"></div>
            <div class="card" id="external-card">
                <div class="location-label">Worli</div>
                <div class="aqi-number" id="out-aqi">--</div>
                <div class="metrics-grid">
                    <div class="metric-block">
                        <span class="m-label">PM 2.5</span>
                        <span class="m-val"><span id="out-pm25">--</span></span>
                    </div>
                    <div class="v-divider"></div>
                    <div class="metric-block">
                        <span class="m-label">PM 10</span>
                        <span class="m-val"><span id="out-pm10">--</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <script>
        // --- Background rotator ---
        const BG_LAYERS = ['bg-1', 'bg-2', 'bg-3'];
        let bgIndex = 0;
        setInterval(() => {
            document.getElementById(BG_LAYERS[bgIndex]).classList.remove('active');
            bgIndex = (bgIndex + 1) % BG_LAYERS.length;
            document.getElementById(BG_LAYERS[bgIndex]).classList.add('active');
        }, 3600000);
 
        // --- Config ---
        const K_KEY = 'nomjPNZHYkGzzP5YIJePqI2cUON67v1pj9JPXb8BpcgnC5VX';
        const GOOGLE_KEY = 'AIzaSyCoDosnEp6Hs4fz4eR4fTw9D9xsvhUAEx8';
        const LAT = 19.0000, LON = 72.8200;
        const DEVICE_IDS = [
            'dfc123cb-bf24-4654-a51c-1f063abf95be',
            '031a1e39-d42b-4e20-9861-2a28365f76a3',
            '9fb4fe83-5340-47ed-af73-3641586d05b8',
            '85ebf1cd-c9b6-4a3d-b8a7-b028564da156',
            '98786370-3dde-4a3e-82f9-f8cf2910d217',
            '46ce3613-b8b8-4ffa-a1bc-7e0ad3eb952a'
        ];
        const CACHE_KEY = 'olp_aqi_cache_v1';
        const STALE_MS = 2 * 60 * 60 * 1000;   // 2 hours — beyond this, don't show cached values
        const REFRESH_MS = 60 * 1000;          // 60 seconds — multiple chances within the 5-min display window
 
        function calcAQI(pm) {
            if (pm <= 30) return Math.round(pm * 50 / 30);
            if (pm <= 60) return Math.round(50 + (pm - 30) * (50 / 30));
            if (pm <= 90) return Math.round(100 + (pm - 60) * (100 / 30));
            if (pm <= 120) return Math.round(200 + (pm - 90) * (100 / 30));
            if (pm <= 250) return Math.round(300 + (pm - 120) * (100 / 130));
            return 500;
        }
 
        function statusFor(aqi) {
            if (aqi <= 15) return "PRISTINE";
            if (aqi <= 30) return "EXCEPTIONAL";
            if (aqi <= 45) return "EXCELLENT";
            if (aqi <= 60) return "VERY GOOD";
            return "GOOD";
        }
 
        // --- Cache helpers ---
        function loadCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                if (!obj || !obj.savedAt) return null;
                if (Date.now() - obj.savedAt > STALE_MS) return null;
                return obj;
            } catch { return null; }
        }
        function saveCache(patch) {
            try {
                const existing = loadCache() || {};
                const next = { ...existing, ...patch, savedAt: Date.now() };
                localStorage.setItem(CACHE_KEY, JSON.stringify(next));
            } catch {}
        }
 
        // --- Render helpers (single source of truth for DOM writes) ---
        function renderIndoor({ aqi, pm25, pm10, fromCache }) {
            const card = document.getElementById('internal-card');
            document.getElementById('in-aqi').innerText = aqi;
            document.getElementById('in-pm25').innerHTML = Math.round(pm25) + ' µg/m³';
            document.getElementById('in-pm10').innerHTML = Math.round(pm10) + ' µg/m³';
            document.getElementById('status-text').innerText = statusFor(aqi);
            card.classList.toggle('stale', !!fromCache);
        }
        function renderOutdoor({ aqi, pm25, pm10, fromCache }) {
            const card = document.getElementById('external-card');
            document.getElementById('out-aqi').innerText = aqi;
            if (pm25 != null) document.getElementById('out-pm25').innerHTML = Math.round(pm25) + ' µg/m³';
            if (pm10 != null) document.getElementById('out-pm10').innerHTML = Math.round(pm10) + ' µg/m³';
            card.classList.toggle('stale', !!fromCache);
        }
 
        // --- Hydrate from cache immediately so the screen never opens at "--" if recent data exists ---
        let lastInAQI = null, lastOutAQI = null;
        (function hydrate() {
            const c = loadCache();
            if (!c) return;
            if (c.indoor) {
                renderIndoor({ ...c.indoor, fromCache: true });
                lastInAQI = c.indoor.aqi;
            }
            if (c.outdoor) {
                renderOutdoor({ ...c.outdoor, fromCache: true });
                lastOutAQI = c.outdoor.aqi;
            }
        })();
 
        // --- Section fetchers (each isolated; one failure can't kill the other) ---
        async function fetchIndoor() {
            const fetches = DEVICE_IDS.map(id =>
                fetch(`https://api.kaiterra.com/v1/devices/${id}/top?key=${K_KEY}`).then(r => r.json())
            );
            const results = await Promise.allSettled(fetches);
            const pm25List = [], pm10List = [];
 
            results.forEach(res => {
                if (res.status !== 'fulfilled' || !res.value || !res.value.data) return;
                const d = res.value.data;
                const v25 = d.find(x => x.param === 'rpm25c')?.points?.[0]?.value;
                const v10 = d.find(x => x.param === 'rpm10c')?.points?.[0]?.value;
                if (typeof v25 === 'number') pm25List.push(v25);
                if (typeof v10 === 'number') pm10List.push(v10);
            });
 
            if (pm25List.length === 0) throw new Error('no indoor PM2.5 samples');
 
            const avg25 = pm25List.reduce((a, b) => a + b, 0) / pm25List.length;
            const avg10 = pm10List.length
                ? pm10List.reduce((a, b) => a + b, 0) / pm10List.length
                : avg25;
            return { aqi: calcAQI(avg25), pm25: avg25, pm10: avg10, devicesSeen: pm25List.length };
        }
 
        async function fetchOutdoor() {
            const gRes = await fetch(
                `https://airquality.googleapis.com/v1/currentConditions:lookup?key=${GOOGLE_KEY}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        location: { latitude: LAT, longitude: LON },
                        extraComputations: ["LOCAL_AQI", "POLLUTANT_CONCENTRATION"]
                    })
                }
            );
            const gData = await gRes.json();
            if (!gData || !gData.indexes) throw new Error('no outdoor index');
            const localIdx = gData.indexes.find(i => i.code === 'ind_cpcb') || gData.indexes[0];
            const pm25 = gData.pollutants?.find(p => p.code === 'pm25')?.concentration?.value;
            const pm10 = gData.pollutants?.find(p => p.code === 'pm10')?.concentration?.value;
            return { aqi: localIdx.aqi, pm25, pm10 };
        }
 
        // --- Trigger logic, separated so it runs even if one section fails ---
        function applyTrigger(inAQI, outAQI) {
            const overlay = document.getElementById('video-overlay');
            const video = document.getElementById('warning-video');
            const dashboard = document.getElementById('dashboard-wrapper');
            const extCard = document.getElementById('external-card');
            const intCard = document.getElementById('internal-card');
 
            if (inAQI != null && inAQI > 100) {
                overlay.style.display = 'block';
                dashboard.style.display = 'none';
                video.muted = true;
                video.load();
                video.play().catch(e => console.log("Autoplay blocked", e));
                return;
            }
            overlay.style.display = 'none';
            dashboard.style.display = 'flex';
            video.pause();
            video.currentTime = 0;
 
            if (inAQI != null && outAQI != null) {
                const diff = Math.abs(outAQI - inAQI);
                if (diff < 50) {
                    intCard.classList.remove('hidden');
                    extCard.classList.add('hidden');
                } else {
                    intCard.classList.remove('hidden');
                    extCard.classList.remove('hidden');
                }
            } else {
                // can't compare — show whichever side we have
                intCard.classList.remove('hidden');
                extCard.classList.remove('hidden');
            }
        }
 
        async function updateData() {
            // Indoor
            try {
                const indoor = await fetchIndoor();
                renderIndoor({ ...indoor, fromCache: false });
                saveCache({ indoor });
                lastInAQI = indoor.aqi;
            } catch (e) {
                console.warn('indoor fetch failed:', e.message);
                // leave whatever's on screen (cached or "--") alone
            }
 
            // Outdoor
            try {
                const outdoor = await fetchOutdoor();
                renderOutdoor({ ...outdoor, fromCache: false });
                saveCache({ outdoor });
                lastOutAQI = outdoor.aqi;
            } catch (e) {
                console.warn('outdoor fetch failed:', e.message);
            }
 
            // Trigger uses whatever values are most recently known
            applyTrigger(lastInAQI, lastOutAQI);
        }
 
        // First fetch immediately; retry quickly if it failed completely
        (async () => {
            await updateData();
            // If indoor still has no number after first fetch, try again in 5s (handles cold-start lag)
            if (document.getElementById('in-aqi').innerText === '--') {
                setTimeout(updateData, 5000);
            }
        })();
 
        setInterval(updateData, REFRESH_MS);
    </script>
</body>
</html>
